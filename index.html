<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TS Tool</title>

  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="layout">

    <!-- FORM -->
    <div class="form-panel">
      <h1>TS Tool ⚡</h1>

      <div class="user-box">
        <input id="username" placeholder="Usuário" />
        <button id="login_btn" onclick="loginUser()">Entrar</button>

        <div id="logged_user" class="logged-user hidden"></div>
      </div>

      <select id="device"></select>

      <input id="client_id" placeholder="🆔 ID do cliente" />
      <input id="ip_lan" placeholder="🌐 IP de acesso" oninput="sanitizeIP(this)" />
      <input id="ip_mgmt" placeholder="🔐 IP de gerência" oninput="sanitizeIP(this)" />

      <button onclick="generate()">Gerar</button>
      <button onclick="exportHistory()">⬇️ Exportar</button>
    </div>

    <!-- HISTÓRICO -->
    <div class="history-panel">

      <div class="section-divider"></div>

      <div class="history-header">
        <h2>📜 Histórico</h2>

        <button class="clear-history" onclick="clearHistory()" title="Limpar histórico">
          limpar
        </button>
      </div>

      <input id="history_search" placeholder="🔍 Buscar..." oninput="renderHistory()" />

      <div id="history"></div>
    </div>

    <!-- RESULTADO -->
    <div class="result-panel">
      <div class="result-tabs">
        <button id="tab-result" onclick="showResult()">Comandos</button>
        <button id="tab-parser" onclick="showParser()">Parser</button>
      </div>

      <div id="result_view">
        <div id="output"></div>
      </div>

      <div id="parser_view" class="hidden">
        <div class="parser-box">
          <textarea id="raw_output" placeholder="Cole o output..."></textarea>
          <button onclick="parseOutput()">Analisar</button>
        </div>

        <div id="analysis"></div>
        <div class="report-box">

          <div class="report-header" onclick="toggleReport()">
            <h2>📄 Relatório</h2>
            <span id="report_toggle_icon">▼</span>
          </div>

          <div id="report_content">
            <textarea id="report_template"></textarea>

            <div class="report-actions">
              <button onclick="generateReport()">Gerar</button>
              <button onclick="copyReport()">📋</button>
              <button onclick="resetTemplate()">Resetar</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer class="footer">
  <div class="footer-content">
    <span>Feito por Matheus Fernandes ⚡</span>

    <div class="footer-links">
      <a href="https://mfsilvadev.github.io/portifolio-web/index.html" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/matheus-fernandes-a4514116a/" target="_blank">LinkedIn</a>
      <a href="mailto:matheusmatheus939@gmail.com">Contato</a>
    </div>
  </div>
</footer>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- App -->
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/parser/cisco_1121.js"></script>
  <script src="js/parser/mikrotik.js"></script>
  <script src="js/parser/index.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/user.js"></script>
  <script src="js/history.js"></script>
  <script src="js/generate.js"></script>
  <script src="js/events.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
